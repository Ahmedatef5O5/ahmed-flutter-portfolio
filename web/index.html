<!DOCTYPE html>
<html>

<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Ahmed Atef — Flutter Developer Portfolio. Building beautiful mobile & web apps with Flutter and Clean Architecture.">
  <meta name="keywords" content="Flutter, Dart, Mobile Developer, Flutter Developer, Clean Architecture">
  <meta name="author" content="Ahmed Atef">

  <!-- Open Graph -->
  <meta property="og:title" content="Ahmed Atef — Flutter Developer">
  <meta property="og:description" content="Building beautiful, performant apps with Flutter & Clean Architecture.">
  <meta property="og:type" content="website">

  <!-- PWA / icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Ahmed Atef — Flutter Developer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0A0A14;
      margin: 0;
      padding: 0;
    }

    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #0A0A14;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #6C63FF;
      border-radius: 50%;
      margin: 0 4px;
      animation: bounce 0.8s infinite alternate;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {
      from {
        transform: translateY(0);
        opacity: 0.4;
      }

      to {
        transform: translateY(-10px);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
